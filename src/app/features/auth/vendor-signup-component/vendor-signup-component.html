<div class="vendor-signup-page">

  <div class="signup-card">
    <h2>Register Your Restaurant</h2>
    <p class="subtitle">Join us and start selling your food online.</p>

    <div class="checklist-box">
      <h4>Keep these ready before you start:</h4>
      <ul>
        <li>✅ FSSAI License Number</li>
        <!-- <li>✅ PAN Card copy</li> -->
        <li>✅ Restaurant menu / price list</li>
        <li>✅ Business address proof</li>
      </ul>
    </div>

    <form (ngSubmit)="onSubmit()" #vendorForm="ngForm">

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="formData.username" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="formData.email" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="formData.password" required />
      </div>

      

       <div class="form-group">
        <label>Contact Number</label>
        <input type="text" name="contactno" [(ngModel)]="formData.contactno" required />
      </div>
      <div class="form-group">
        <label>Restaurant Name</label>
        <input type="text" name="restaurantName" [(ngModel)]="formData.restaurantName" required />
      </div>

      <div class="form-group">
        <label>FSSAI License Number</label>
        <input type="text" name="fssaiLicense" [(ngModel)]="formData.fssaiLicense" required />
      </div>

      <div class="form-group">
        <label>Business Address</label>
        <textarea name="businessAddress" [(ngModel)]="formData.businessAddress" required></textarea>
      </div>

      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
      <div class="success-msg" *ngIf="successMsg">{{ successMsg }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Submitting...' : 'Register Restaurant' }}
      </button>

    </form>
  </div>

</div>
