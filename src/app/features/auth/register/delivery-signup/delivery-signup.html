<div class="vendor-signup-page">
  <div class="signup-card animate-fade-in">
    
    <!-- Branding Header -->
    <div class="brand-wrapper">
      <div class="brand-logo-wrap">
        <svg class="brand-logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
        </svg>
      </div>
      <div class="brand-info">
        <span class="brand-name">ZappEat</span>
        <span class="brand-subtitle">Delivery Partner</span>
      </div>
    </div>

    <!-- Form Title -->
    <div class="form-header">
      <h2>Become a Delivery Partner </h2>
      <p class="subtitle">Join our fleet and start delivering.</p>
    </div>

    <!-- Keep Ready Checklist -->
    <div class="checklist-box">
      <h4>Keep these ready before you start:</h4>
      <ul>
        <li><span class="check-dot"></span> Valid Driving License</li>
        <li><span class="check-dot"></span> Vehicle Registration Details</li>
        <li><span class="check-dot"></span> ID Proof</li>
      </ul>
    </div>

    <!-- Form -->
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">

      <!-- SECTION 1: ACCOUNT CREDENTIALS -->
      <fieldset class="form-section">
        <legend class="section-title">Account Details </legend>
        <div class="form-grid">
          
          <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
              <input type="text" formControlName="username" placeholder="e.g. John Doe" required />
            </div>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
              <input type="email" formControlName="email" placeholder="e.g. driver@example.com" required />
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <input type="password" formControlName="password" placeholder="Min 6 characters" required />
            </div>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <div class="input-wrapper">
              <input type="text" formControlName="phone" placeholder="10-digit number" required />
            </div>
          </div>

        </div>
      </fieldset>

      <!-- SECTION 2: VEHICLE DETAILS -->
      <fieldset class="form-section">
        <legend class="section-title">Vehicle Details</legend>
        <div class="form-grid">
          
          <div class="form-group">
            <label>Vehicle Type</label>
            <div class="input-wrapper">
              <select formControlName="vehicleType" required>
                <option value="" disabled selected>Select Vehicle Type</option>
                <option value="BIKE">Bike</option>
                <option value="SCOOTY">Scooty</option>
              
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Vehicle Number</label>
            <div class="input-wrapper">
              <input type="text" formControlName="vehicleNumber" placeholder="e.g. MH12AB1234" required />
            </div>
          </div>

        </div>
      </fieldset>

      <!-- SECTION 3: DOCUMENT DETAILS -->
      <fieldset class="form-section">
        <legend class="section-title">Document Details</legend>
        <div class="form-grid">
          
          <div class="form-group">
            <label>Driving License Number</label>
            <div class="input-wrapper">
              <input type="text" formControlName="drivingLicense" placeholder="e.g. MH12 20120000000" required />
            </div>
          </div>

          <div class="form-group">
            <label>Aadhaar / PAN Number</label>
            <div class="input-wrapper">
              <input type="text" formControlName="aadharPan" placeholder="e.g. 1234 5678 9012" required />
            </div>
          </div>

        </div>
      </fieldset>

      <!-- Message Banners -->
      <div class="success-msg animate-fade-in" *ngIf="message">
        <span class="banner-icon"></span>
        <span>{{ message }}</span>
      </div>

      <!-- Action Button -->
      <button type="submit" class="submit-btn" [disabled]="signupForm.invalid">
        <span>Register as Delivery Partner</span>
      </button>

    </form>
  </div>
</div>
