<header class="page-header" id="main-navbar" [class.scrolled]="isScrolled">
  <div class="header-inner page-inner">

    <!-- Brand -->
    <div class="brand" routerLink="/getmenu">
      <div class="brand-logo-wrap">
        <svg class="brand-logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="header-left">
        <span class="brand-name">ZappEat</span>
        <span class="sub-text">Elevated Everyday Meals</span>
      </div>
    </div>

   

    <!-- Right Actions -->
    <div class="nav-actions">

      <!-- 🛒 Cart Button -->
      <button  *ngIf="!isCheckoutPage" class="cart-btn" routerLink="/cart" aria-label="View Shopping Cart" id="navbar-cart-btn">
        <span class="cart-icon-wrap">
          <svg class="cart-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
        </span>
        <span class="cart-label">Cart</span>
        <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </button>

     

      <!-- 🔹 NOT LOGGED IN -->
      <button *ngIf="!isLoggedIn" class="signin-btn" routerLink="/login" id="navbar-signin-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Sign In</span>
      </button>

      <!-- 🔹 LOGGED IN -->
      <div *ngIf="isLoggedIn" class="profile-wrap" (mouseenter)="showDropdown = true" (mouseleave)="showDropdown = false">
        <button class="profile-btn" id="navbar-profile-btn">
          <div class="avatar-circle">
            {{ username?.charAt(0)?.toUpperCase() }}
          </div>
          <span class="profile-name">{{ username }}</span>
          <svg class="chevron-icon" [class.rotated]="showDropdown" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>

        <div class="profile-dropdown" *ngIf="showDropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar">{{ username?.charAt(0)?.toUpperCase() }}</div>
            <div class="dropdown-user-info">
              <span class="dropdown-name">{{ username }}</span>
              <span class="dropdown-role">Food Enthusiast</span>
            </div>
          </div>
          <hr class="dropdown-divider" />
          <button (click)="goTo('/orders')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            My Orders
          </button>
          <button (click)="goTo('/favourites')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            Favourites
          </button>
          <hr class="dropdown-divider" />
          <button class="logout-item" (click)="logout()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
